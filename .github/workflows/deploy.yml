name: Deploy VitePress site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup pnpm
        # pnpm/action-setup@v6 refuses to accept both `version:` here and
        # `packageManager` in package.json. Let package.json drive the version.
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # pnpm 11 (declared in package.json packageManager) needs Node 22.13+
          node-version: 22
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build with VitePress
        run: NODE_ENV=production pnpm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload dist repository root to github-pages branch
          path: docs/.vitepress/dist

  # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

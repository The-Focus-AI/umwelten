name: CI

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup pnpm
        # pnpm/action-setup@v6 refuses to accept both `version:` here and
        # `packageManager` in package.json. Let package.json drive the version.
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # pnpm 11 (declared in package.json packageManager) needs Node 22.13+
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test:run
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run lint
        run: pnpm lint

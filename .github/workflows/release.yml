name: Publish to npm

# Fires when a `v*` tag is pushed. Publishes every non-private workspace
# package to npm via `pnpm publish -r`. pnpm rewrites `workspace:*` deps
# into the concrete published version automatically at publish time.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # needed for npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        # Unit suite is fast (~8s) and has no network/LLM/Docker deps. We
        # treat a green test:run as a release gate. Integration tests are
        # left to manual runs.
        run: pnpm test:run

      - name: Publish workspace packages to npm
        # `pnpm -r publish` walks every workspace package, skips the ones
        # marked `private: true`, and rewrites `workspace:*` deps into the
        # concrete published version. `--no-git-checks` avoids tripping on
        # the fact that we're in detached-HEAD on the tag.
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

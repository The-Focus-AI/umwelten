<!doctype html>
<html lang="en" data-palette="ink">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gaia · Habitat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<div class="app" data-palette="ink" data-layout="columns" data-sidebar="nested">

  <!-- ════ SIDEBAR ════ -->
  <aside class="sidebar">
    <div class="sidebar-brand" data-action="go-home">
      <span class="wordmark">Gaia</span>
      <span class="meta">Habitat</span>
    </div>

    <div class="sidebar-section">
      <span>Agents</span>
      <span class="count" id="sidebar-count">00</span>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <!-- ════ MAIN ════ -->
  <main class="main">

    <div class="topbar">
      <div class="crumbs" id="crumbs"></div>
      <div class="tweaks-toggle" data-action="toggle-tweaks">Tweaks</div>
    </div>

    <!-- Dashboard / Agent detail -->
    <section class="view" id="dashboard"></section>

    <!-- Session transcript -->
    <section class="view hidden session-view" id="session-view">
      <div class="session-head" id="session-head-content"></div>
      <div class="transcript" id="transcript">
        <div class="transcript-inner" id="transcript-inner"></div>
      </div>
    </section>

    <!-- Composer (Ask Gaia / Ask Agent) -->
    <div class="composer collapsed" id="composer">
      <div class="composer-handle" id="composer-handle"></div>
      <div class="composer-bar">
        <span class="title" id="composer-title" data-action="toggle-composer">Ask Gaia</span>
        <span class="expand" data-action="toggle-composer">Expand ↕</span>
      </div>
      <div class="composer-messages" id="gaia-messages"></div>
      <div class="composer-input">
        <span class="prompt" id="gaia-prompt">gaia&gt;</span>
        <input type="text" id="gaia-input" placeholder="Ask about this habitat..." autocomplete="off">
      </div>
    </div>

  </main>

  <!-- Tweaks floating panel -->
  <div class="tweaks" id="tweaks"></div>

</div>

<script src="artifacts.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
